<style>
:root{--bg:#F4F6FA;--surface:#FFFFFF;--panel:#F8F9FC;--border:#DDE2EE;--blue:#1A4BAD;--blue2:#2E63D4;--text:#1A2035;--muted:#6B7592;--subtle:#C8D0E4}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
.header{background:var(--surface);border-bottom:2px solid var(--blue);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:1000;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{width:30px;height:30px;background:var(--blue);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center}
.logo-mark span{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:#fff}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.8px;color:var(--blue);text-transform:uppercase}
.hdr-div{width:1px;height:26px;background:var(--border)}
.hdr-sub{font-size:11px;color:var(--muted)}
.badge{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:3px 9px;font-size:11px;color:var(--muted)}
.badge strong{color:var(--blue)}
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.day-pills{display:flex;gap:4px}
.day-pill{padding:4px 14px;border-radius:3px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .15s;font-family:'Barlow',sans-serif}
.day-pill:hover{border-color:var(--blue);color:var(--blue)}
.day-pill.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
.gmaps-btn{margin-left:auto;display:flex;align-items:center;gap:5px;padding:5px 14px;background:transparent;border:1px solid var(--blue);border-radius:3px;color:var(--blue);font-size:10px;font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.gmaps-btn:hover{background:var(--blue);color:#fff}
.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.stat-item{display:flex;align-items:baseline;gap:5px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--blue);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.stat-sep{width:1px;height:18px;background:var(--border)}
.ptag{padding:2px 7px;border-radius:2px;font-size:10px;font-weight:600;background:rgba(26,75,173,.09);color:#1A4BAD;border:1px solid rgba(26,75,173,.2)}
.main{display:grid;grid-template-columns:360px 1fr;height:calc(100vh - 54px - 42px - 38px)}
@media(max-width:760px){.main{grid-template-columns:1fr;height:auto}}
.sidebar{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:8px 12px;border-bottom:1px solid var(--border)}
.sidebar-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.route-list{flex:1;overflow-y:auto;padding:5px}
.route-list::-webkit-scrollbar{width:3px}
.route-list::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:2px}
.stop-card{display:flex;gap:8px;padding:9px 10px;border-radius:4px;margin-bottom:4px;border:1px solid transparent;cursor:pointer;transition:all .12s;position:relative}
.stop-card:hover{background:var(--surface);border-color:var(--border)}
.stop-card.selected{background:var(--surface);border-color:var(--blue);border-left-width:3px;padding-left:8px}
.stop-num-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.stop-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.stop-conn{width:1px;height:16px;margin:2px 0;background:rgba(26,75,173,.2)}
.stop-body{flex:1;min-width:0}
.stop-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.stop-meta{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.stop-time{font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;color:var(--blue);background:rgba(26,75,173,.09);padding:1px 5px;border-radius:2px}
.stop-dist{font-size:10px;color:var(--muted)}
.stop-dur{font-size:10px;color:var(--muted)}
.stop-ot{font-size:10px;color:var(--blue);font-weight:500;line-height:1.35;padding:3px 6px;border-radius:3px;border-left:2px solid var(--blue);background:rgba(26,75,173,.05);margin-bottom:3px}
.stop-cig{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#1E8A5E;background:rgba(30,138,94,.09);border:1px solid rgba(30,138,94,.2);padding:1px 6px;border-radius:2px;margin-top:2px}
.nav-link{display:inline-flex;align-items:center;gap:2px;font-size:10px;color:var(--blue);margin-top:3px;text-decoration:none}
#map{flex:1;height:100%;min-height:400px}
.leaflet-container{background:#F0F4F8}
.bat-marker{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Barlow',sans-serif;color:white;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.bat-marker.selected{box-shadow:0 0 0 3px rgba(26,75,173,.35),0 2px 8px rgba(0,0,0,.4)!important}
.leaflet-popup-content-wrapper{background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.leaflet-popup-content{margin:0}
.leaflet-popup-tip{background:#fff}
.leaflet-popup-close-button{color:var(--muted)!important;top:7px!important;right:9px!important;font-size:16px!important}
.popup-inner{padding:13px 14px;min-width:270px;max-width:340px}
.popup-header{display:flex;align-items:flex-start;gap:9px;margin-bottom:10px}
.popup-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.popup-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.2}
.popup-cadena{font-size:10px;font-weight:600;letter-spacing:.4px}
.popup-hora{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--blue);background:rgba(26,75,173,.09);padding:1px 6px;border-radius:2px;margin-top:3px}
.ot-block{background:rgba(26,75,173,.05);border:1px solid rgba(26,75,173,.18);border-left:3px solid var(--blue);border-radius:5px;padding:8px 10px;margin-bottom:9px}
.ot-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--blue);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.ot-text{font-size:12px;color:var(--text);line-height:1.45;font-weight:500}
.popup-grid{display:grid;grid-template-columns:auto 1fr;gap:3px 9px;margin-bottom:8px}
.popup-key{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;font-weight:500;padding-top:1px;white-space:nowrap}
.popup-val{font-size:11px;color:var(--text);line-height:1.4}
.popup-cig{display:flex;align-items:center;gap:5px;padding:5px 8px;background:rgba(30,138,94,.08);border:1px solid rgba(30,138,94,.2);border-radius:3px;margin-bottom:8px}
.popup-cig-text{font-size:11px;color:#1E8A5E;font-weight:500}
.popup-actions{display:flex;gap:5px}
.popup-btn{flex:1;padding:6px;border-radius:4px;font-size:11px;font-weight:600;font-family:'Barlow',sans-serif;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px;border:none;transition:opacity .12s}

.leaflet-control-zoom a{background:#fff!important;color:var(--text)!important;border-color:var(--border)!important}
.leaflet-bar{border:1px solid var(--border)!important;box-shadow:0 2px 6px rgba(0,0,0,.07)!important}
</style>
</head>

function getPoints(){return DATA[String(curDay)]||[];}
function calcTimes(pts){
  let m=START;
  return pts.map((p,i)=>{if(i>0)m+=TRAVEL;const s=m,d=VISIT_MIN[p.proyecto]||25;m+=d;return{start:s,end:m,dur:d};});
}
function fmt(m){return`${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

map=L.map('map',{zoomControl:true,attributionControl:false}).setView([-12.1,-77.03],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
L.control.attribution({position:'bottomright'}).addAttribution('© CartoDB').addTo(map);

function renderMap(){
  const pts=getPoints(), times=calcTimes(pts);
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  polylines.forEach(l=>map.removeLayer(l)); polylines=[];
  if(!pts.length) return;

  const ll=pts.map(p=>[p.lat,p.lon]);
  polylines.push(L.polyline(ll,{color:BLUE,weight:2.5,opacity:.4,dashArray:'5,4'}).addTo(map));

  // Arrows
  for(let i=0;i<ll.length-1;i++){
    const mx=(ll[i][0]+ll[i+1][0])/2,my=(ll[i][1]+ll[i+1][1])/2;
    const ang=Math.atan2(ll[i+1][1]-ll[i][1],ll[i+1][0]-ll[i][0])*180/Math.PI;
    polylines.push(L.marker([mx,my],{icon:L.divIcon({className:'',html:`<div style="transform:rotate(${ang}deg)"><svg width="10" height="10" viewBox="-5 -5 10 10"><polygon points="4,0 -3,3.5 -3,-3.5" fill="${BLUE}" opacity=".5"/></svg></div>`,iconSize:[10,10],iconAnchor:[5,5]})}).addTo(map));
  }

  pts.forEach((p,i)=>{
    const col=CADENA_CLR[p.cadena]||'#888', isSel=selIdx===i, sz=isSel?30:22;

      ${cigBlock}
      <div class="popup-actions">
        <a class="popup-btn popup-btn-maps" href="${mapsUrl}" target="_blank">📍 Google Maps</a>
        <a class="popup-btn popup-btn-waze" href="${wazeUrl}" target="_blank">🔵 Waze</a>
      </div>
    </div>`,{maxWidth:360});

    m.on('click',()=>{selIdx=(selIdx===i?null:i);renderMap();renderList();if(selIdx!==null)scrollToCard(selIdx);});
    markers.push(m);
  });

  if(ll.length) map.fitBounds(L.latLngBounds(ll).pad(.13));
  renderList(); renderStats();
}

function renderList(){
  const pts=getPoints(), times=calcTimes(pts);
  document.getElementById('sidebarTitle').textContent=`Día ${curDay} · ${pts.length} paradas`;
  document.getElementById('routeList').innerHTML=pts.map((p,i)=>{
    const t=times[i], col=CADENA_CLR[p.cadena]||'#888', isSel=selIdx===i;
    const mapsUrl=`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lon}&travelmode=driving`;
    const cig=p.cigarrera?`<div class="stop-cig">🚬 ${esc(p.cigarrera)}${p.cant_cig?' ×'+p.cant_cig:''}</div>`:'';
    return`<div class="stop-card${isSel?' selected':''}" id="card-${i}" onclick="selectCard(${i})">
      <div class="stop-num-wrap">
        <div class="stop-num" style="background:${col}">${p.orden}</div>
        ${i<pts.length-1?'<div class="stop-conn"></div>':''}
      </div>
      <div class="stop-body">
        <div class="stop-name">${esc(p.pos)}</div>
        <div class="stop-meta">
          <span class="stop-time">${fmt(t.start)}</span>
          <span class="stop-dist">${esc(p.distrito)}</span>
          <span class="stop-dur">${t.dur}min</span>
        </div>
        <div class="stop-ot">${esc(p.ot)||'—'}</div>
        ${cig}
        <a class="nav-link" href="${mapsUrl}" target="_blank">↗ Navegar</a>
      </div>
    </div>`;
  }).join('');
}

function renderStats(){
  const pts=getPoints(), times=calcTimes(pts);
  if(!pts.length){document.getElementById('statsBar').innerHTML='';return;}
  const last=times[times.length-1];
  const cadenas={};pts.forEach(p=>cadenas[p.cadena]=(cadenas[p.cadena]||0)+1);
  const proyectos=[...new Set(pts.map(p=>p.proyecto))];
  document.getElementById('statsBar').innerHTML=
    `<span class="stat-item"><span class="stat-val">08:00</span><span class="stat-lbl">Inicio</span></span>`+
    `<span class="stat-sep"></span>`+
    `<span class="stat-item"><span class="stat-val">${fmt(last.end)}</span><span class="stat-lbl">Fin est.</span></span>`+
    `<span class="stat-sep"></span>`+
    `<span class="stat-item"><span class="stat-val" style="font-size:16px">${pts.length}</span><span class="stat-lbl">Visitas</span></span>`+
    `<span class="stat-sep"></span>`+
    Object.entries(cadenas).map(([k,v])=>`<span class="stat-item"><span class="stat-val" style="color:${CADENA_CLR[k]||'#888'};font-size:15px">${v}</span><span class="stat-lbl">${k}</span></span>`).join('')+
    `<span class="stat-sep"></span>`+
    `<div style="display:flex;gap:4px;flex-wrap:wrap">${proyectos.map(p=>`<span class="ptag">${esc(p)}</span>`).join('')}</div>`;
}

function selectCard(i){selIdx=(selIdx===i?null:i);renderMap();if(selIdx!==null)markers[selIdx]?.openPopup();}
function scrollToCard(i){document.getElementById('card-'+i)?.scrollIntoView({behavior:'smooth',block:'nearest'});}
window.selectDay=(d,btn)=>{curDay=d;selIdx=null;document.querySelectorAll('.day-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderMap();};
window.openFullRoute=()=>{
  const pts=getPoints();if(!pts.length)return;
  const o=`${pts[0].lat},${pts[0].lon}`,d=`${pts[pts.length-1].lat},${pts[pts.length-1].lon}`;
  const wp=pts.slice(1,-1).map(p=>`${p.lat},${p.lon}`).join('|');
  window.open(`https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}&waypoints=${wp}&travelmode=driving`,'_blank');
};
window.addEventListener('resize',()=>{selIdx=null;renderMap();});
setTimeout(renderMap,120);
</script>
</body>
</html>
